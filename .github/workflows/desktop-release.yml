name: desktop-release

# Build the ChromaVale desktop app for Windows and macOS and publish the
# installers to a GitHub Release. Trigger by pushing a version tag, e.g.:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The release is created as a draft so you can review the assets before
# publishing it.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'ChromaVale ${{ github.ref_name }}'
          releaseBody: |
            ChromaVale desktop app.

            Download the installer for your platform below. These builds are
            not yet code-signed, so Windows SmartScreen or macOS Gatekeeper may
            show a warning on first launch.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
